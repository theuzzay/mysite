<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/42/b5/76/42b57666dbe879a032955b85c5dcdcd5.jpg?w=64&h=64">

  <style>
    .blog-container {
      max-width: 1400px;
      margin: 2rem auto 0 auto;
      padding: 0 1rem;
    }
    
    .blog-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2.5rem;
      justify-content: center;
      align-items: center;
    }
    
    .blog-filter button {
      background: rgba(24,24,27,0.6);
      color: #ff2222;
      border: 2px solid #ff2222;
      border-radius: 12px;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-family: 'Roboto Mono', monospace;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      backdrop-filter: blur(15px);
    }
    
    .blog-filter button.active,
    .blog-filter button:hover {
      background: #ff2222;
      color: #fff;
      border-color: #ff4444;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,34,34,0.3);
    }
    
    .blog-search {
      margin-left: auto;
      min-width: 250px;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      border: 2px solid #ff2222;
      background: rgba(24,24,27,0.6);
      color: #fff;
      font-size: 1rem;
      font-family: 'Roboto Mono', monospace;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(15px);
    }
    
    .blog-search:focus {
      border-color: #ff4444;
      box-shadow: 0 0 20px rgba(255,34,34,0.3);
    }
    
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
      max-height: 65vh;
      overflow-y: auto;
      padding: 1rem 0;
    }
    
    .blog-card {
      background: rgba(24,24,27,0.55);
      border-radius: 16px;
      padding: 2rem;
      border: 2px solid rgba(255,34,34,0.2);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(15px);
    }
    
    .blog-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ff2222, #ff4444);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    
    .blog-card:hover {
      transform: translateY(-8px);
      border-color: #ff2222;
      box-shadow: 0 15px 40px rgba(255,34,34,0.2);
    }
    
    .blog-card:hover::before {
      transform: scaleX(1);
    }
    
    .blog-card-category {
      display: inline-block;
      background: rgba(255,34,34,0.1);
      color: #ff2222;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
      border: 1px solid rgba(255,34,34,0.3);
    }
    
    .blog-card-title {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    
    .blog-card-description {
      color: #a2a2a6;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    
    .blog-card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #ff2222;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    .blog-card-link:hover {
      color: #ff4444;
      transform: translateX(5px);
    }
    
    .blog-card-link::after {
      content: '→';
      transition: transform 0.3s ease;
    }
    
    .blog-card-link:hover::after {
      transform: translateX(3px);
    }
    @media (max-width: 900px) {
      .blog-grid { grid-template-columns: 1fr; gap: 1.2rem; max-height: unset; }
      .blog-card { padding: 1.1rem; }
      .blog-card-title { font-size: 1.1rem; }
      .blog-filter { gap: 0.8rem; margin-bottom: 1.5rem; }
      .blog-filter button { font-size: 0.9rem; padding: 0.6rem 1.2rem; }
      .blog-search { min-width: 120px; font-size: 0.9rem; }
      .h-title.glitch-effect { font-size: 1.2rem; }
      .blog-card-thumb, .blog-card-thumb.placeholder { width: 40px; height: 40px; margin-right: 0.7rem; }
      .blog-card { word-break: break-word; }
    }
    
    @media (max-width: 768px) {
      .blog-container { padding: 0 0.5rem; }
      .blog-grid { grid-template-columns: 1fr; gap: 1.2rem; max-height: 60vh; }
      .blog-card { padding: 1.2rem; }
      .blog-card-title { font-size: 1.1rem; }
      .blog-filter { gap: 0.8rem; margin-bottom: 1.5rem; }
      .blog-filter button { font-size: 0.9rem; padding: 0.6rem 1.2rem; }
      .blog-search { min-width: 200px; font-size: 0.9rem; }
      .h-title.glitch-effect { font-size: 1.8rem; }
    }
    
    @media (max-width: 480px) {
      .blog-grid { max-height: unset; gap: 1rem; }
      .blog-card { padding: 0.7rem; }
      .blog-card-title { font-size: 1rem; }
      .blog-card-description { font-size: 0.9rem; }
      .blog-filter { gap: 0.6rem; margin-bottom: 1rem; }
      .blog-filter button { font-size: 0.8rem; padding: 0.5rem 1rem; }
      .blog-search { min-width: 80px; font-size: 0.8rem; }
      .h-title.glitch-effect { font-size: 1rem; }
      .blog-card-thumb, .blog-card-thumb.placeholder { width: 32px; height: 32px; margin-right: 0.5rem; }
      .blog-card { word-break: break-word; }
    }
    .blog-grid { overflow-x: auto; }
  </style>
  <style>
    .blog-card-thumb-wrap {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 1rem;
    }
    .blog-card-thumb {
      width: 100px;
      height: 60px;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 2px 12px #ff222255;
      border: 2px solid #ff2222;
      background: #18181b;
      margin-right: 1rem;
      flex-shrink: 0;
      transition: box-shadow 0.3s;
    }
    .blog-card-thumb.placeholder {
      background: repeating-linear-gradient(135deg, #222 0 10px, #333 10px 20px);
      border: 2px dashed #444;
      width: 60px;
      height: 60px;
      border-radius: 10px;
      margin-right: 1rem;
    }
    .blog-card[data-category="certificates"] .blog-card-thumb {
      width: 140px;
      height: 70px;
    }
    @media (max-width: 480px) {
      .blog-card[data-category="certificates"] .blog-card-thumb {
        width: 100px;
        height: 50px;
      }
    }
  </style>
</head>
<body class="blog">
    <div id="particles-js" style="position:fixed; inset:0; z-index:0;"></div>
    <div class="preloader">
      <div class="centrize full-width">

          <div class="pre-inner">

          </div>

  <div class="container">
    <header class="header">
      <div class="head-top" style="justify-content: flex-end;">
        <div class="top-menu">
          <div class="top-menu-nav">

              <li><a href="../index.html">Home</a></li>
              <li><a href="resume.html">About</a></li>
              <li class="current-menu-item"><a href="blog.html">Blog</a></li>
            </ul>
          </div>
          <span class="sidebar_btn"><span></span></span>
        </div>
        <a href="#" class="menu-btn" style="padding:0; background:none; border:none; margin-left:1.5rem;">
          <img src="https://i.pinimg.com/736x/7c/0e/ee/7c0eeef765f71de93114d1b260d90361.jpg" alt="Avatar" style="width:38px; height:38px; border-radius:50%; box-shadow:0 0 12px #ff2222cc,0 0 0 4px #222a; object-fit:cover; display:block;">
        </a>
      </div>
    </header>
    <div class="wrapper">
      <div class="section started background-enabled">
        <div class="centrize full-width">
          <div class="vertical-center">
            <div class="started-content blog-container">
              <h1 class="h-title glitch-effect" data-text="Blog"><span>Blog</span></h1>
              <div class="blog-filter">
                <button class="active" data-category="all">All</button>
                <button data-category="certificates">Certificates</button>
                <button data-category="htb-academy">HTB Academy Modules</button>
                <button data-category="ctf">CTF/Writeup</button>
                <input type="text" id="blog-search" class="blog-search" placeholder="Search blog..." />

  <script src="../js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="../js/particles-config.js"></script>
  <script>
// Blog sayfası için üç ayrı JSON dosyasından veri çekme
async function fetchData(url) {
  const res = await fetch(url);
  if (!res.ok) return [];
  return await res.json();
}

async function loadBlogData() {
  const [certificates, modules, ctf] = await Promise.all([
    fetchData('../json/certificates.json'),
    fetchData('../json/modules.json'),
    fetchData('../json/ctf.json')
  ]);
  generateBlogCards(certificates, modules, ctf);
  setupCategoryFilter(); // Kategori filtreleme fonksiyonunu yükle
}

function generateBlogCards(certificates, modules, ctf) {
  const blogGrid = document.getElementById('blog-grid');
  blogGrid.innerHTML = '';

  certificates.forEach(item => {
    const card = createBlogCard(item, 'certificates', 'Certificates');
    blogGrid.appendChild(card);
  });
  modules.forEach(item => {
    const card = createBlogCard(item, 'htb-academy', 'HTB Academy Modules');
    blogGrid.appendChild(card);
  });
  ctf.forEach(item => {
    const card = createBlogCard(item, 'ctf', 'CTF/Writeup');
    blogGrid.appendChild(card);
  });
}

function createBlogCard(item, category, categoryName) {
  const card = document.createElement('div');
  card.className = 'blog-card';
  card.setAttribute('data-category', category);
  const linkText = category === 'certificates' ? 'View Certificate' : 
                  category === 'htb-academy' ? 'View Module' : 'Read Article';
  let imgUrl = item.image || '';
  const imgHtml = imgUrl ? `<img class="blog-card-thumb" src="${imgUrl}" alt="${item.title} image" loading="lazy">` : `<div class="blog-card-thumb placeholder"></div>`;
  card.innerHTML = `
    <div class="blog-card-thumb-wrap">${imgHtml}</div>
    <div class="blog-card-category">${categoryName}</div>
    <h3 class="blog-card-title">${item.title}</h3>
    <p class="blog-card-description">${item.description}</p>
    <a href="${item.link}" class="blog-card-link" target="_blank">${linkText}</a>
  `;
  return card;
}

function setupCategoryFilter() {
  const buttons = document.querySelectorAll('.blog-filter button[data-category]');
  const cards = document.querySelectorAll('.blog-card');
  buttons.forEach(btn => {
    btn.addEventListener('click', function() {
      // Aktif butonu güncelle
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.getAttribute('data-category');
      cards.forEach(card => {
        if (cat === 'all' || card.getAttribute('data-category') === cat) {
          card.style.display = '';
        } else {
          card.style.display = 'none';
        }
      });
    });
  });
}

document.addEventListener('DOMContentLoaded', loadBlogData);
  </script>
</body>
