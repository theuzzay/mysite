  <style>
    .blog-container {
      max-width: 1400px;
      margin: 2rem auto 0 auto;
      padding: 0 1rem;
    }
    
    .blog-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2.5rem;
      justify-content: flex-start;
      align-items: center;
    }
    
    .blog-filter button {
      background: rgba(24,24,27,0.6);
      color: #ff2222;
      border: 2px solid #ff2222;
      border-radius: 12px;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-family: 'Roboto Mono', monospace;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      backdrop-filter: blur(15px);
    }
    
    .blog-filter button.active,
    .blog-filter button:hover {
      background: #ff2222;
      color: #fff;
      border-color: #ff4444;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,34,34,0.3);
    }
    

    
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
      max-height: 65vh;
      overflow-y: auto;
      padding: 1rem 0;
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }
    
    .blog-grid::-webkit-scrollbar {
      display: none; /* Chrome, Safari and Opera */
    }
    
    .blog-card {
      background: rgba(24,24,27,0.55);
      border-radius: 16px;
      padding: 2rem;
      border: 2px solid rgba(255,34,34,0.2);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(15px);
    }
    
    .blog-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ff2222, #ff4444);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    
    .blog-card:hover {
      transform: translateY(-8px);
      border-color: #ff2222;
      box-shadow: 0 15px 40px rgba(255,34,34,0.2);
    }
    
    .blog-card:hover::before {
      transform: scaleX(1);
    }
    
    .blog-card-category {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    .blog-card-category > span:first-child {
      display: inline-block;
      background: rgba(255,34,34,0.1);
      color: #ff2222;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(255,34,34,0.3);
    }
    
    .difficulty-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 15px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .difficulty-badge.fundamental {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }
    
    .difficulty-badge.easy {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }
    
    .difficulty-badge.medium {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.4);
    }
    
    .difficulty-badge.hard {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }
    
    .blog-card-title {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    
    .blog-card-description {
      color: #a2a2a6;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    
    .blog-card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #ff2222;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    .blog-card-link:hover {
      color: #ff4444;
      transform: translateX(5px);
    }
    
    .blog-card-link::after {
      content: '→';
      transition: transform 0.3s ease;
    }
    
    .blog-card-link:hover::after {
      transform: translateX(3px);
    }
    @media (max-width: 900px) {
      .blog-container { padding: 0 1rem; }
      .blog-grid { grid-template-columns: 1fr; gap: 1.2rem; max-height: unset; }
      .blog-card { padding: 1.1rem; }
      .blog-card-title { font-size: 1.1rem; }
      .blog-filter { gap: 0.8rem; margin-bottom: 1.5rem; }
      .blog-filter button { font-size: 0.9rem; padding: 0.6rem 1.2rem; }
      .h-title.glitch-effect { font-size: 1.2rem; }
      .blog-card-thumb, .blog-card-thumb.placeholder { width: 35px; height: 35px; margin-right: 0.7rem; }
      .blog-card { word-break: break-word; }
    }
    
    @media (max-width: 768px) {
      .blog-container { padding: 0 0.8rem; }
      .blog-grid { grid-template-columns: 1fr; gap: 1rem; max-height: 70vh; }
      .blog-card { padding: 1rem; }
      .blog-card-title { font-size: 1rem; }
      .blog-card-description { font-size: 0.9rem; }
      .blog-filter { gap: 0.6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
      .blog-filter button { font-size: 0.85rem; padding: 0.5rem 1rem; }
      .h-title.glitch-effect { font-size: 1.5rem; }
      .blog-card-thumb, .blog-card-thumb.placeholder { width: 32px; height: 32px; margin-right: 0.6rem; }
      .difficulty-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; }
    }
    
    @media (max-width: 480px) {
      .blog-container { padding: 0 0.5rem; }
      .blog-grid { max-height: 75vh; gap: 0.8rem; }
      .blog-card { padding: 0.8rem; }
      .blog-card-title { font-size: 0.95rem; }
      .blog-card-description { font-size: 0.85rem; line-height: 1.5; }
      .blog-filter { gap: 0.4rem; margin-bottom: 1rem; }
      .blog-filter button { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
      .h-title.glitch-effect { font-size: 1.2rem; }
      .blog-card-thumb, .blog-card-thumb.placeholder { width: 28px; height: 28px; margin-right: 0.5rem; }
      .difficulty-badge { font-size: 0.65rem; padding: 0.15rem 0.5rem; }
      .blog-card-link { font-size: 0.85rem; }
    }
    
    @media (max-width: 360px) {
      .blog-container { padding: 0 0.3rem; }
      .blog-grid { max-height: 80vh; gap: 0.6rem; }
      .blog-card { padding: 0.6rem; }
      .blog-card-title { font-size: 0.9rem; }
      .blog-card-description { font-size: 0.8rem; }
      .blog-filter { gap: 0.3rem; margin-bottom: 0.8rem; }
      .blog-filter button { font-size: 0.75rem; padding: 0.3rem 0.6rem; }
      .h-title.glitch-effect { font-size: 1rem; }
      .blog-card-thumb, .blog-card-thumb.placeholder { width: 25px; height: 25px; margin-right: 0.4rem; }
      .difficulty-badge { font-size: 0.6rem; padding: 0.1rem 0.4rem; }
      .blog-card-link { font-size: 0.8rem; }
    }
    .blog-grid { overflow-x: auto; }
  </style>
  <style>
    .blog-card-thumb-wrap {
      width: 100%;
      display: flex;
      justify-content: flex-start;

    .blog-card-thumb {
      width: 50px;

      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 2px 8px #ff222255;
      border: 1px solid #ff2222;
      background: #18181b;
      margin-right: 1rem;
      flex-shrink: 0;
      transition: box-shadow 0.3s;
      padding: 2px;
    }
    .blog-card-thumb.placeholder {
      background: repeating-linear-gradient(135deg, #222 0 10px, #333 10px 20px);
      border: 1px dashed #444;
      width: 50px;
      height: 50px;
      border-radius: 8px;
      margin-right: 1rem;
    }
    @media (max-width: 480px) {
      .blog-card-thumb, .blog-card-thumb.placeholder {
        width: 30px;
        height: 30px;
        margin-right: 0.5rem;
      }
    }
  </style>
</head>

  <script>
// Blog sayfası için üç ayrı JSON dosyasından veri çekme
async function fetchData(url) {
  const res = await fetch(url);
  if (!res.ok) return [];
  return await res.json();
}

async function loadBlogData() {
  const [certificates, modules, ctf] = await Promise.all([
    fetchData('../json/certificates.json'),
    fetchData('../json/modules.json'),
    fetchData('../json/ctf.json')
  ]);
  generateBlogCards(certificates, modules, ctf);
}

function generateBlogCards(certificates, modules, ctf) {
  const blogGrid = document.getElementById('blog-grid');
  blogGrid.innerHTML = '';

  // Modülleri difficulty'ye göre sırala (Hard → Fundamental)
  const difficultyOrder = { 'Hard': 0, 'Medium': 1, 'Easy': 2, 'Fundamental': 3 };
  const sortedModules = modules.sort((a, b) => {
    const aOrder = difficultyOrder[a.difficulty] || 4;
    const bOrder = difficultyOrder[b.difficulty] || 4;
    return aOrder - bOrder;
  });

  // Sadece certificates göster (sayfa açıldığında)
  certificates.forEach(item => {
    const card = createBlogCard(item, 'certificates', 'Certificates');
    blogGrid.appendChild(card);
  });
  
  // Diğer kategorileri gizle
  sortedModules.forEach(item => {
    const card = createBlogCard(item, 'htb-academy', 'HTB Academy Modules');
    card.style.display = 'none';
    blogGrid.appendChild(card);
  });
  ctf.forEach(item => {
    const card = createBlogCard(item, 'ctf', 'CTF');
    card.style.display = 'none';
    blogGrid.appendChild(card);
  });
}

function createBlogCard(item, category, categoryName) {
  const card = document.createElement('div');
  card.className = 'blog-card';
  card.setAttribute('data-category', category);
  const linkText = category === 'certificates' ? 'View Certificate' : 
                  category === 'htb-academy' ? 'View Module' : 'Read Article';
  let imgUrl = item.image || '';
  const imgHtml = imgUrl ? `<img class="blog-card-thumb" src="${imgUrl}" alt="${item.title} image" loading="lazy">` : `<div class="blog-card-thumb placeholder"></div>`;
  
  // Difficulty badge oluştur
  const difficultyBadge = item.difficulty ? `<span class="difficulty-badge ${item.difficulty.toLowerCase()}">${item.difficulty}</span>` : '';
  
  card.innerHTML = `
    <div class="blog-card-thumb-wrap">${imgHtml}</div>
    <div class="blog-card-category">
      <span>${categoryName}</span>
      ${difficultyBadge}
    </div>
    <h3 class="blog-card-title">${item.title}</h3>
    <p class="blog-card-description">${item.description}</p>
    <a href="${item.link}" class="blog-card-link" target="_blank">${linkText}</a>
  `;
  return card;
}

// Filtreleme fonksiyonu
function setupFiltering() {
  const filterButtons = document.querySelectorAll('.blog-filter button');
  const blogCards = document.querySelectorAll('.blog-card');

  filterButtons.forEach(button => {
    button.addEventListener('click', () => {
      // Aktif buton stilini güncelle
      filterButtons.forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');

      const selectedCategory = button.getAttribute('data-category');

      // Kartları filtrele
      blogCards.forEach(card => {
        if (card.getAttribute('data-category') === selectedCategory) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  // Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('../sw.js')
        .then(registration => {
          console.log('SW registered: ', registration);
        })
        .catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
    });
  }

  loadBlogData();
  // Filtreleme kurulumunu biraz geciktir çünkü kartlar dinamik olarak yükleniyor
  setTimeout(() => {
    setupFiltering();
    // URL parametresinden kategoriyi kontrol et
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('category');
    if (category) {
      // İlgili kategori butonunu bul ve tıkla
      const targetButton = document.querySelector(`[data-category="${category}"]`);
      if (targetButton) {
        targetButton.click();
      }
    }
  }, 500);
});
  </script>
