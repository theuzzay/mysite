  <style>
    body.home {
      background: #000 !important;
      color: #fff;
    }
    .home-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      background: url('https://i.pinimg.com/736x/7a/96/7a/7a967a66b6323a97d34ab290cf224839.jpg') center center no-repeat;
      background-size: cover;
      opacity: 0.22;
      pointer-events: none;
      user-select: none;
    }
    .home-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
      z-index: 1;
      margin-top: -60px;
    }
    .h-title.glitch-effect {
      font-size: 3.5rem;
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      margin-bottom: 1.2rem;
      letter-spacing: 0.5px;
      text-align: center;
      font-weight: 700;
      text-shadow: none;
      text-transform: uppercase;
      opacity: 0.85;
      animation: shakeY 2.2s infinite alternate;
      display: block;
      transition: opacity 0.3s;
    }
    @media (max-width: 768px) {
      .h-title.glitch-effect { font-size: 2.5rem; }
      .h-subtitle { font-size: 1rem; }
      .social-icons.big { gap: 1rem; }
      .social-icons.big a { font-size: 1.3rem; }
      .home-content { margin-top: -40px; }
    }
    @media (max-width: 480px) {
      .h-title.glitch-effect { font-size: 1.8rem; }
      .h-subtitle { font-size: 0.9rem; min-width: 180px; }
      .social-icons.big { gap: 0.8rem; }
      .social-icons.big a { font-size: 1.1rem; }
      .home-content { margin-top: -30px; }
    }
    @media (max-width: 360px) {
      .h-title.glitch-effect { font-size: 1.5rem; }
      .h-subtitle { font-size: 0.8rem; min-width: 160px; }
      .social-icons.big { gap: 0.6rem; }
      .social-icons.big a { font-size: 1rem; }
      .home-content { margin-top: -20px; }
    }
    @keyframes shakeY {
      0% { transform: translateY(0); }
      20% { transform: translateY(-2px); }
      40% { transform: translateY(2px); }
      60% { transform: translateY(-1px); }
      80% { transform: translateY(1px); }
      100% { transform: translateY(0); }
    }
    .h-subtitles {
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      text-align: center;
    }
    .h-subtitle {
      color: #fff;
      font-size: 1.2rem;
      font-family: 'Roboto Mono', monospace;
      opacity: 0.7;
      animation: shakeY 2.2s infinite alternate;
      display: inline-block;
      transition: opacity 0.3s;
      min-width: 220px;
    }
    .social-icons.big {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1.2rem;
    }
    .social-icons.big a {
      font-size: 1.5rem;
      color: #fff;
      transition: color 0.2s;
    }
    .social-icons.big a:hover {
      color: #f26b38;
    }
    .avatar.neon-glow {
      display: none;
    }
  </style>
</head>
